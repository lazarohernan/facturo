name: facturo
description: "Facturo - Gestión profesional de facturas, cotizaciones y gastos para tu negocio. Crea facturas ilimitadas, escanea documentos con OCR, gestiona clientes y lleva el control financiero de tu empresa."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.5+9

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2

  # Supabase for authentication and database
  supabase_flutter: ^2.10.3

  # Firebase for push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI components
  flutter_svg: ^2.2.3
  google_fonts: ^6.3.2
  flutter_slidable: ^3.1.2
  signature: ^5.5.0
  lottie: ^3.1.2

  # Form validation
  form_validator: ^2.1.1

  # Navigation
  go_router: ^14.8.1

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Image picker
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  image: ^4.3.0
  
  # Cached network images for optimized image loading
  cached_network_image: ^3.3.1

  # Charts
  syncfusion_flutter_charts: ^31.2.15

  # Path and image processing
  path: ^1.9.0
  uuid: ^4.5.2
  intl: ^0.20.2

  # Shared preferences
  shared_preferences: ^2.2.2
  
  # Time ago formatting
  timeago: ^3.7.0
  
  # Secure storage (persists after uninstall on iOS)
  flutter_secure_storage: ^9.2.2

  # PDF and printing
  pdf: ^3.10.7
  printing: ^5.12.0
  share_plus: ^10.1.4
  flutter_email_sender: ^6.0.3
  image_gallery_saver: ^2.0.3

  # Contacts - Native picker (no permissions required)
  flutter_native_contact_picker: ^0.0.11
  
  # HTML to PDF conversion for multiple invoice templates
  flutter_html_to_pdf: ^0.7.0
  cross_file: ^0.3.5+1
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  excel: ^4.0.6
  # In-app purchases
  # See this guide for more information on how to use it
  # https://flutter.dev/docs/development/data-and-backend/in-app-purchases
  in_app_purchase: ^3.2.0
  flutter_localizations:
    sdk: flutter
  http: ^1.6.0
  flutter_screenutil: ^5.9.3
  phosphor_flutter: ^2.1.0
  icons_plus: ^5.0.0
  
  # Google ML Kit para OCR offline (sin APIs externas)
  google_mlkit_text_recognition: ^0.15.0
  
  # Google Gemini AI para procesamiento inteligente de facturas
  flutter_gemini: ^3.0.0

  # Apple Sign In nativo para iOS
  sign_in_with_apple: ^6.1.1
  
  # Google Sign In nativo
  google_sign_in: ^6.2.1
  
  # Haptic feedback nativo (Taptic Engine iOS)
  haptic_feedback: ^0.6.4+3

  # App badge control (iOS badge on app icon)
  flutter_app_badger: ^1.5.0



  crypto: any
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # App Icons
  flutter_launcher_icons: "^0.14.3"

  # Riverpod code generation
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5
  change_app_package_name: ^1.5.0

# The following section is specific to Flutter packages.
  mockito: any
flutter:
  # the material Icons class.
  uses-material-design: true

  # Enable code generation for localizations
  generate: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/templates/
    - assets/previews/
    - .env

# Permisos para acceder a galería y cámara
permissions:
  android: [
    INTERNET,
    ACCESS_NETWORK_STATE,
    READ_EXTERNAL_STORAGE,
    WRITE_EXTERNAL_STORAGE,
    CAMERA
  ]
  ios: [
    NSPhotoLibraryUsageDescription: "Para seleccionar el logo de tu negocio",
    NSCameraUsageDescription: "Para tomar una foto del logo de tu negocio"
  ]

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/facturo_logo.jpg"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/facturo_logo.jpg"
  windows:
    generate: true
    image_path: "assets/images/facturo_logo.jpg"
  macos:
    generate: true
    image_path: "assets/images/facturo_logo.jpg"
